services:
  nova-image-studio:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: godissogood/nova-image-studio:${NOVA_IMAGE_TAG:-latest}
    container_name: nova-image-studio
    init: true
    env_file:
      - .env
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ../../data:/app/backend/data
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/api/nova/config').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
